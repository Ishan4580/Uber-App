server:
  port: 8085

spring:
  application:
    name: driver-service

    datasource:
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true

    #Kafka configuration
    kafka:
      bootstrap-servers: localhost:9092
      consumer:
        group-id: driver-service-user-group
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.common.serialization.StringDeserializer
        properties:
          spring:
            json:
              trusted:
                packages: "*"
        auto-offset-reset:  earliest
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.common.serialization.StringSerializer

#Eureka Client configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
    
debug: true
